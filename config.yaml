# Scanner configuration. This is the only user-facing knob in the repo.
# Forking the scanner for your own catalogue is a single edit here plus
# enabling Actions and GitHub Pages on your fork.

# Schema version of THIS config file. Bumped when the shape changes.
config_version: 1

catalogue:
  # Where to enumerate skills from. Both the current production format
  # (in-tree under .agents/skills/) and the future external-sources
  # format (registry/<ns>/skills/README.md with sources[].repo) are
  # supported. When both name the same slug, the external-sources entry
  # wins.
  registry_repo:
    owner: coder
    repo: registry
    ref: main
  formats:
    external_sources:
      enabled: true
      # Path glob, relative to the cloned catalogue. Each matched README
      # has its frontmatter parsed for sources[].repo plus per-skill
      # overrides keyed by slug.
      readme_glob: registry/*/skills/README.md
    in_tree:
      enabled: true
      # The namespace is fixed for in-tree skills today (coder).
      namespace: coder
      # Path glob inside the catalogue repo. Each <slug>/SKILL.md is one
      # skill row in the matrix.
      base_path: .agents/skills

scanners:
  skillspector:
    enabled: true
    # Pin by commit SHA. Bumped manually via PR; the workflow's pip
    # install reads this same pin so contributors do not have to keep
    # the version in two places. Dependabot does not parse this file,
    # so a bumper bot lives outside the loop until the upstream
    # publishes to PyPI and the pin can move into pyproject.toml.
    pin: "skillspector @ git+https://github.com/NVIDIA/SkillSpector.git@2eb844780ab163f01468ecf142c40a2ec0fcaec0"
    # Extra CLI flags passed to every SkillSpector invocation. Left
    # empty so .github/workflows/scan.yaml can drive --no-llm
    # dynamically based on whether the LLM credential secret is set
    # (see contract under the llm: block below).
    flags: []
    # SkillSpector ships a two-stage analyser: fast static rules
    # followed by an optional LLM semantic pass. Measured on the five
    # in-tree skills, LLM mode dropped catalogue-wide findings from
    # 25 to 2 and moved coder/setup from malicious to clean. See
    # docs/CALIBRATION.md for the per-skill numbers and methodology.
    #
    # Contract with .github/workflows/scan.yaml: the workflow reads
    # the credential matching the provider below from a repository
    # secret. When the secret is set, LLM mode runs. When the secret
    # is missing, the workflow appends --no-llm so a fresh fork is
    # never broken by an unset secret.
    #
    # NOTE: scan.yaml in this branch still hardcodes --no-llm. The
    # matching workflow edit is in this PR's description but is
    # committed separately because the Coder Agents GitHub App on
    # this repo currently lacks the `workflows: write` scope. After
    # both land, the config and the workflow drive LLM mode together.
    #
    # Provider options:
    #   provider   env var(s)                          endpoint
    #   anthropic  ANTHROPIC_API_KEY                   api.anthropic.com
    #   openai     OPENAI_API_KEY + OPENAI_BASE_URL    any OpenAI-compatible URL
    #   nv_build   NVIDIA_INFERENCE_KEY                build.nvidia.com (free)
    #
    # Changing provider also requires updating the env block in
    # .github/workflows/scan.yaml so the matching secret is wired in,
    # and adding the secret under Settings > Secrets and variables >
    # Actions.
    llm:
      # Hits api.anthropic.com directly with an Anthropic API key (not
      # routed through Coder's AI Gateway). aibridge was the original
      # plan, but SkillSpector pipes every provider through
      # langchain_openai.ChatOpenAI which hits `/v1/chat/completions`,
      # and aibridge only mounts that path under `/openai`, not
      # `/anthropic`. The `anthropic` provider in SkillSpector also
      # hardcodes `https://api.anthropic.com/v1/` and ignores
      # ANTHROPIC_BASE_URL, so aibridge cannot be steered into the
      # Claude path today. This means the Anthropic API key is on a
      # separate billing line from Coder usage.
      provider: anthropic
      # claude-sonnet-4-6 is SkillSpector's own pick for the
      # finding-classification task: it is the bundled default for
      # the anthropic provider's `meta_analyzer` slot, which the
      # provider docstring describes as "cheaper for the high-volume
      # filter pass." SkillSpector's `DEFAULT_MODEL` is
      # `claude-opus-4-6`, used for the deeper analyzer slots
      # (~5x the per-token cost); the per-finding intent
      # classification this scanner relies on does not need
      # Opus-class reasoning. Bare alias rather than a dated suffix
      # (the dated suffixes for the 4-6 series are not accepted as
      # of June 2026; the bare alias is the canonical ID). Bump
      # this string to `claude-opus-4-6`, `claude-opus-4-8`, or
      # `claude-fable-5` if a higher tier is warranted; SkillSpector
      # passes it directly to the Anthropic API.
      model: "claude-sonnet-4-6"

# Per-skill verdict policy. v1 has one input (SkillSpector risk_score).
# When more scanners join the pipeline we add new threshold fields here
# and a matching branch in scanner/verdict.py.
#
# Thresholds are aligned to SkillSpector's own severity bands so that the
# UI verdict matches the recommendation field SkillSpector returns:
#
#   0-20   LOW       SAFE             -> verdict: clean
#   21-50  MEDIUM    CAUTION          -> verdict: clean (advisory; see below)
#   51-80  HIGH      DO_NOT_INSTALL   -> verdict: suspicious
#   81-100 CRITICAL  DO_NOT_INSTALL   -> verdict: malicious
#
# Rationale and source links live in docs/CALIBRATION.md. Short version:
# SkillSpector's static-analysis layer is loud on real catalogues (the
# ClawHub paper measured a ~49% positive rate on 67k skills) and is
# advisory rather than authoritative, so we only escalate above its
# HIGH cutoff. CAUTION-band findings still appear in the per-skill page
# so reviewers can see them; we just do not flag the skill as suspicious
# at the catalogue level.
verdict:
  malicious_risk_score: 81
  suspicious_risk_score: 51

publish:
  # One GitHub Release per scan. The rolling `latest` tag is the floor
  # the registry-server proxy falls back to when Pages is degraded.
  release:
    tag_format: "scan-{utc:%Y-%m-%dT%H-%MZ}"
    rolling_tag: latest
    retention_days: 90
  # Public CDN-cached JSON via actions/deploy-pages. The site reads
  # latest.json through a small proxy in coder/registry-server that
  # caches for 5 minutes and lets Cloudflare hold stale for 10 more.
  pages:
    enabled: true
    files:
      latest: latest.json
      history_dir: history
      history_retention_days: 30

# The schedule fires at :17 past the hour, every 6 hours, to dodge the
# top-of-hour cron-drift cluster on shared GitHub-hosted runners.
schedule:
  cron: "17 */6 * * *"
