# Scanner configuration. This is the only user-facing knob in the repo.
# Forking the scanner for your own catalogue is a single edit here plus
# enabling Actions and GitHub Pages on your fork.

# Schema version of THIS config file. Bumped when the shape changes.
config_version: 1

catalogue:
  # Where to enumerate skills from. Both current production format
  # (in-tree under .agents/skills/) and the future external-sources
  # format (registry/<ns>/skills/README.md with sources[].repo) are
  # supported. The enumerator tries external_sources first when it
  # exists in the cloned catalogue and falls back to in_tree.
  registry_repo:
    owner: coder
    repo: registry
    ref: main
  formats:
    external_sources:
      enabled: true
      # Path glob, relative to the cloned catalogue. The frontmatter
      # under each matched README is parsed for sources[].repo and
      # sources[].skills.<slug>.
      readme_glob: registry/*/skills/README.md
    in_tree:
      enabled: true
      # The namespace is fixed for in-tree skills today (coder).
      namespace: coder
      # Path glob inside the registry repo. Each <slug>/SKILL.md is one
      # skill row in the matrix.
      base_path: .agents/skills

scanners:
  skillspector:
    enabled: true
    # Pin by commit SHA. Bumped via Renovate-style PRs with manual review
    # of any verdict-shape change.
    pin: "skillspector @ git+https://github.com/NVIDIA/SkillSpector.git@2eb844780ab163f01468ecf142c40a2ec0fcaec0"
    flags:
      - "--no-llm"
    # SkillSpector exits non-zero when findings are present even though
    # the JSON output writes successfully. Treat a missing JSON as the
    # only true crash; everything else is a verdict signal.
    treat_exit_nonzero_as_crash: false

  clamav:
    enabled: true
    # apt packages installed in the scan job. clamav-freshclam refreshes
    # signatures on each run; cache via actions/cache keyed on the day.
    apt_packages:
      - clamav
      - clamav-daemon
      - clamav-freshclam
    flags:
      - "--recursive"
      - "--infected"
      - "--no-summary"
      - "--detect-pua=yes"
      - "--cross-fs=no"

# Per-skill verdict policy. All thresholds live here so policy is
# reviewable in one place. Order is malicious > suspicious > unknown
# > clean; the first matching rule wins.
verdict:
  malicious_if:
    - clamav.infected_files > 0
    - skillspector.risk_score >= 75
  suspicious_if:
    - skillspector.risk_score >= 40
    - clamav.error_count > 0
  unknown_if:
    - skillspector.crashed == true
    - skillspector.json_missing == true
    - clamav.signature_db_age_hours > 48
    - catalogue_drift_present
  # Anything else is clean.

publish:
  # One GitHub Release per scan. Latest is the rolling pointer the proxy
  # falls back to when Pages is degraded.
  release:
    tag_format: "scan-{utc:%Y-%m-%dT%H-%MZ}"
    rolling_tag: latest
    retention_days: 90
  # Public CDN-cached JSON via actions/deploy-pages. The site reads
  # latest.json through a small proxy in coder/registry-server that
  # caches for 5 minutes and lets Cloudflare hold stale for 10 more.
  pages:
    enabled: true
    files:
      latest: latest.json
      history_dir: history
      history_retention_days: 30

# The schedule fires at :17 past the hour, every 6 hours, to dodge the
# top-of-hour cron-drift cluster. Community reports show 5-15 min
# routine drift at :00 and 30+ min on busy days.
schedule:
  cron: "17 */6 * * *"
